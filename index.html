<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תיק ההשקעות שלי</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <!-- CDN Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">📈 SharePortfolio</span>
  <div class="nav-links">
    <a href="index.html"     class="nav-link active">תיק השקעות</a>
    <a href="buy.html"       class="nav-link">ניתוח קנייה</a>
    <a href="sell.html"      class="nav-link">המלצות מכירה</a>
    <a href="watchlist.html" class="nav-link">מעקב</a>
    <a href="settings.html"  class="nav-link">הגדרות</a>
  </div>
</nav>

<main class="main">
  <!-- Page header -->
  <div class="page-header">
    <h1 class="page-title">תיק ההשקעות שלי</h1>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" id="btn-import">ייבוא CSV</button>
      <button class="btn btn-outline btn-sm" id="btn-export">ייצוא CSV</button>
      <button class="btn btn-primary"        id="btn-add-holding">+ הוסף אחזקה</button>
    </div>
  </div>
  <input type="file" id="file-import" accept=".csv" style="display:none">

  <!-- Summary stats -->
  <div class="stat-grid" id="summary-grid">
    <div class="card">
      <div class="card-title">שווי תיק</div>
      <div class="card-value ltr" id="summary-value">—</div>
    </div>
    <div class="card">
      <div class="card-title">עלות כוללת</div>
      <div class="card-value ltr" id="summary-cost">—</div>
    </div>
    <div class="card">
      <div class="card-title">רווח / הפסד</div>
      <div class="card-value ltr" id="summary-pnl">—</div>
      <div class="ltr" id="summary-pnl-pct" style="font-size:.9rem;font-weight:600">—</div>
    </div>
    <div class="card">
      <div class="card-title">מספר אחזקות</div>
      <div class="card-value" id="summary-count">—</div>
    </div>
  </div>

  <!-- Allocation chart + table -->
  <div class="allocation-wrap">
    <div class="allocation-chart-card">
      <div class="card-title">פיזור תיק</div>
      <canvas id="allocation-chart" width="200" height="200"></canvas>
    </div>
    <div style="flex:1;overflow-x:auto">
      <!-- Holdings table -->
      <div id="dashboard-loading" class="loading-wrap" style="display:none">
        <div class="spinner"></div><span>טוען נתונים...</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>סמל</th>
              <th>שם</th>
              <th>מניות</th>
              <th>עלות ממוצעת</th>
              <th>מחיר נוכחי</th>
              <th>שווי</th>
              <th>ר"ה $</th>
              <th>ר"ה %</th>
              <th>אות</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody id="holdings-tbody">
            <tr><td colspan="10" class="empty-state">טוען...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Add / Edit Modal -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">הוסף אחזקה</span>
      <button class="btn-icon" id="btn-modal-cancel">✕</button>
    </div>
    <form id="holding-form" novalidate>
      <div class="form-row">
        <label class="form-label" for="field-ticker">סמל מניה</label>
        <input class="input input-rtl" id="field-ticker" placeholder="לדוגמה: AAPL" required style="text-transform:uppercase">
      </div>
      <div class="form-row">
        <label class="form-label" for="field-shares">כמות מניות</label>
        <input class="input" id="field-shares" type="number" step="0.000001" min="0.000001" placeholder="10" required>
      </div>
      <div class="form-row">
        <label class="form-label" for="field-cost">עלות ממוצעת לשנייה (USD)</label>
        <input class="input" id="field-cost" type="number" step="0.01" min="0.01" placeholder="150.00" required>
      </div>
      <div class="form-row">
        <label class="form-label" for="field-date">תאריך קנייה (אופציונלי)</label>
        <input class="input" id="field-date" type="date">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="btn-modal-cancel-2" onclick="document.getElementById('modal-overlay').classList.remove('open')">ביטול</button>
        <button type="submit" class="btn btn-primary">שמור</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script type="module" src="js/portfolio.js"></script>
</body>
</html>
